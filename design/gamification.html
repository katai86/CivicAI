<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KÖZ.TÉR – Gamification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="screen">
    <div class="card">
      <div class="tagline">Rang fejlődés</div>
      <div class="xp-wrap">
        <div class="xp-bar"><span></span></div>
        <div class="xp-value">850 XP / 1200 XP</div>
      </div>
      <div class="timeline">
        <div class="rank-item"><span class="rank-dot"></span><div>Kátyúvadász Tanonc</div></div>
        <div class="rank-item"><span class="rank-dot"></span><div>Szemfüles Szomszéd</div></div>
        <div class="rank-item"><span class="rank-dot"></span><div>Helyi Vagány</div></div>
      </div>
    </div>

    <div class="card">
      <div class="tagline">Jelvények</div>
      <div class="badge-grid">
        <div class="badge-tile"></div>
        <div class="badge-tile"></div>
        <div class="badge-tile"></div>
        <div class="badge-tile"></div>
        <div class="badge-tile"></div>
        <div class="badge-tile"></div>
      </div>
    </div>
  </div>
</body>
</html>
